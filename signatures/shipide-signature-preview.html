<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shipide Signature Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f5f7;
        padding: 48px 20px;
      }

      .preview-stack {
        display: grid;
        gap: 18px;
      }

      .preview {
        position: relative;
        overflow: hidden;
        padding: 16px 24px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
      }

      .preview > table {
        position: relative;
        z-index: 1;
      }

      .preview-corner {
        position: absolute;
        top: -1px;
        right: -1px;
        width: 124px;
        height: auto;
        opacity: 0.62;
        pointer-events: none;
      }

      .preview-dark {
        background: #00060f;
        border-color: #202838;
      }
    </style>
  </head>
  <body>
    <div class="preview-stack">
    <div class="preview">
      <img class="preview-corner" src="./group-11182.png" alt="" aria-hidden="true" />
      <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;font-family:Helvetica,Arial,sans-serif;color:#0b0f17;">
        <tr>
          <td style="vertical-align:top;padding:0;">
            <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;width:356px;">
              <tr>
                <td style="padding:0 0 7px 0;">
                  <div style="font-size:14px;line-height:17px;font-weight:500;color:#0b0f17;letter-spacing:0;">
                    Louis Dias
                  </div>
                  <div style="font-size:12px;line-height:16px;color:#667085;letter-spacing:0;">
                    Head of Business
                  </div>
                </td>
              </tr>
              <tr>
                <td style="padding:8px 0 0 0;border-top:1px solid #e5e7eb;">
                  <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;width:100%;">
                    <tr>
                      <td style="padding:0 12px 0 0;vertical-align:middle;width:70px;">
                        <a href="https://shipide.com" style="color:#0b0f17;text-decoration:none;border:0;">
                          <img
                            src="../assets/shipide-logo-black.png"
                            width="64"
                            alt="Shipide"
                            style="display:block;width:64px;height:auto;border:0;"
                          />
                        </a>
                      </td>
                      <td style="padding:0;vertical-align:middle;font-size:12px;line-height:16px;color:#667085;text-align:right;white-space:nowrap;width:100%;">
                        <a href="mailto:louis@shipide.com" style="color:#0b0f17;text-decoration:none;">louis@shipide.com</a>
                        <span style="display:inline-block;height:14px;margin:0 10px;border-left:1px solid #98a2b3;vertical-align:-3px;"></span>
                        <a href="tel:+32488280456" style="color:#0b0f17;text-decoration:none;">+32 488 28 04 56</a>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </div>
    <div class="preview preview-dark">
      <img class="preview-corner" src="./group-11182.png" alt="" aria-hidden="true" />
      <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;font-family:Helvetica,Arial,sans-serif;color:#f8fafc;">
        <tr>

                      <td style="padding:0 12px 0 0;vertical-align:middle;width:70px;">
                        <a href="https://shipide.com" style="color:#f8fafc;text-decoration:none;border:0;">
                          <img
                            src="../assets/shipide-logo-white.png"
                            width="64"
                            alt="Shipide"
                            style="display:block;width:64px;height:auto;border:0;"

                        <a href="mailto:louis@shipide.com" style="color:#f8fafc;text-decoration:none;">louis@shipide.com</a>

                        <a href="tel:+32488280456" style="color:#f8fafc;text-decoration:none;">+32 488 28 04 56</a>
                      </td>

    </div>

  </body>
</html>

<table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:separate;border-spacing:0;width:446px;background:#00060f;border:1px solid #202838;border-radius:4px;font-family:Helvetica,Arial,sans-serif;color:#f8fafc;">
  <tr>
    <td style="padding:18px 28px;vertical-align:top;">
      <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;width:390px;">
        <tr>
          <td style="padding:0 0 7px 0;vertical-align:top;">
            <div style="font-size:15px;line-height:18px;font-weight:500;color:#f8fafc;letter-spacing:0;">
              {{name}}
            </div>
            <div style="font-size:12px;line-height:16px;color:#98a2b3;letter-spacing:0;">
              {{title}}
            </div>
          </td>
          <td style="padding:0;vertical-align:top;text-align:right;width:138px;">
            <img
              src="https://shipide.com/signatures/group-11182.svg"
              width="138"
              alt=""
              style="display:block;width:138px;height:auto;border:0;margin:-19px -29px 0 auto;opacity:0.62;"
            />
          </td>
        </tr>
        <tr>
          <td colspan="2" style="padding:8px 0 0 0;border-top:1px solid #263142;">
            <table cellpadding="0" cellspacing="0" role="presentation" style="border-collapse:collapse;width:100%;">
              <tr>
                <td style="padding:0 14px 0 0;vertical-align:middle;width:78px;">
                  <a href="https://shipide.com" style="color:#f8fafc;text-decoration:none;border:0;">
                    <img
                      src="https://shipide.com/assets/shipide-logo-white.svg"
                      width="72"
                      alt="Shipide"
                      style="display:block;width:72px;height:auto;border:0;"
                    />
                  </a>
                </td>
                <td style="padding:0;vertical-align:middle;font-size:12px;line-height:16px;color:#98a2b3;text-align:right;white-space:nowrap;width:100%;">
                  <a href="mailto:{{email}}" style="color:#f8fafc;text-decoration:none;">{{email}}</a>
                  <span style="display:inline-block;height:14px;margin:0 10px;border-left:1px solid #475467;vertical-align:-3px;"></span>
                  <a href="tel:{{phoneHref}}" style="color:#f8fafc;text-decoration:none;">{{phone}}</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
